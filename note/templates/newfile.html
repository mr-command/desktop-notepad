{% extends 'base.html' %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new file</title>
{% block content %}
    <link rel="stylesheet" href="{% static 'style/newfile.css' %}">
</head>
<body class="grid_container">


    <nav>
        <a href="{% url 'myfile' %}">My files</a>
    </nav>
    <main class="grid_items">

    <a href="{% url 'newfile2' %}">
        <button class="main_item">
        <img src="{% static 'image/add.png' %}" alt="">
     <br>
    Add a Note
    </button>
    </a>

    {% for note in notes %}
    <a href="{% url 'note' note.id %}"><button class="main_item">
     <br>
     <br>
        {{ note.title }}
    </button>
    </a>
    {% endfor %}
    </main>

    <!-- <script src="script.js"></script> -->
</body>
</html>
{% endblock %}
